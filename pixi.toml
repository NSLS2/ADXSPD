[workspace]
authors = ["Jakub Wlodek <jwlodek@bnl.gov>"]
channels = ["conda-forge"]
name = "ADXSPD"
platforms = ["linux-64"]
version = "0.2.0"

[tasks]
lint = "pre-commit run --all-files"
build = "make -sj"
simulator = "python scripts/xspdSimulator.py xspdApp/tests/samples/single_module_xsp_sim.json --host 127.0.0.1 --port 8008 --data-port 4300"
make-paramdefs = "epicsdbtools paramdefs xspdApp/Db xspdApp/src -p XSPD"
make-bobfiles = "epicsdb2bob xspdApp/Db xspdApp/op/bob/autogenerated -d -r _RBV -t none"
make-sample-responses = "python scripts/generate_sample_response_json.py"
tests = "./xspdApp/tests/O.linux-x86_64/TestADXSPD"
get-coverage-info = "lcov --no-external --capture --directory xspdApp/src --output-file coverage.info"
make-coverage-report = "genhtml coverage.info --output-directory coverage-report"
ioc = "cd iocs/xspdIOC/iocBoot/iocXSPD && ./st.cmd"

[dependencies]
pre-commit = ">=4.5.1,<5"
ruff = ">=0.14.0,<0.15"
pip = ">=25.2,<26"
python = ">=3.12.12,<3.13"
pyzmq = ">=27.1.0,<28"
requests = ">=2.32.5,<3"
clang-format = ">=21.1.8,<22"
lcov = ">=1.16,<2"
numpy = ">=2.4.3,<3"
blosc = ">=1.21.6,<2"
fastapi = ">=0.136.0,<0.137"

[pypi-dependencies]
epicsdbtools = { git = "https://github.com/jwlodek/epicsdbtools.git" }
epicsdb2bob = { git = "https://github.com/NSLS2/epicsdb2bob.git" }
